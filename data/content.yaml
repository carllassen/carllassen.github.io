leadtitle: "Vi hjælper med at elektrificere, digitalisere og automatisere"
leaddescription: "Elektrificeringen giver typisk muligheder for at digitalisere en større del af processerne. Elektrificerede teknologier kræver mindre vedligeholdelse og åbner muligheder for automatisering og besparelser."
buttoncaption: "Priser og planer"
buttonurl: "/contact.html"

feature:
  - FeatureTitle: "Elektrificering"
    FeatureDescription: "Electriciteten er allerbilligst midt på dagen. Som virksomhed har du en kæmpe mulighed for at gøre noget godt for klimaet imens du får store besparelser."
    FeatureImage: "images/feature-1.png"
  - FeatureTitle: "Digitalisering"
    FeatureDescription: "Det er meget nemmere at måle de electrificerede teknologier, da energiflowet kan fungere uden menneskelig indblanding. Derfor bliver det nemmere at spore afkastet af sin investering."
    FeatureImage: "images/feature-2.png"
  - FeatureTitle: "Automatisering"
    FeatureDescription: "De fleste af teknologierne er tilknyttet internettet og kan derfor styres automatisk. Det giver yderligere besparelser og gør hverdagen simplere."
    FeatureImage: "images/feature-3.png"
  - FeatureTitle: "LCA og ESG"
    FeatureDescription: "Vi kan også lave LCA-analyser og hjælpe med ESG-rapportering. Vi tager højde for alle processerne og materialerne gennem hele produktets levetid."
    FeatureImage: "images/feature-4.png"

