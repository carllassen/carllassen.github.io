<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/contact.css">
</head>
<body>
  <main class="container">
    <h1>Kontakt</h1>
    <form action="mailto:carl4lassen@gmail.com" method="get" enctype="text/plain">
      <label>Subject:<br>
        <input type="text" name="subject" placeholder="Your Name"><br>
      </label>
      <label>Email:<br>
        <input type="email" name="email" placeholder="Your Email"><br>
      </label>
      <label>Message:<br>
        <textarea name="body" rows="5" cols="30" placeholder="Your Message"></textarea><br>
      </label>
      <input type="submit" value="Send" class="button button-primary">
    </form>
  </main>
</body>
</html>
